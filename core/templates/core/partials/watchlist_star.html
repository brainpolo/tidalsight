<style>
    @keyframes star-glow {
        0%   { filter: drop-shadow(0 0 0px transparent); }
        15%  { filter: drop-shadow(0 0 0px transparent); }
        35%  { filter: drop-shadow(0 0 2px color-mix(in srgb, var(--color-copper) 40%, transparent)); }
        55%  { filter: drop-shadow(0 0 4px var(--color-copper)) drop-shadow(0 0 8px color-mix(in srgb, var(--color-copper) 25%, transparent)); }
        80%  { filter: drop-shadow(0 0 6px var(--color-copper)) drop-shadow(0 0 12px color-mix(in srgb, var(--color-copper) 40%, transparent)); }
        100% { filter: drop-shadow(0 0 8px var(--color-copper)) drop-shadow(0 0 16px var(--color-copper)) drop-shadow(0 0 24px color-mix(in srgb, var(--color-copper) 35%, transparent)); }
    }
    .ts-star:hover svg {
        animation: star-glow 3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    .ts-star:active svg {
        animation: none;
        filter: drop-shadow(0 0 6px var(--color-copper));
    }
</style>
<button
    hx-post="{% url 'core:toggle_watchlist' asset.ticker %}"
    hx-swap="outerHTML"
    title="{% if is_watched %}Remove from watchlist{% else %}Add to watchlist{% endif %}"
    class="ts-star group p-1.5 -m-1.5 cursor-pointer active:scale-90 transition-transform duration-150 ease-out"
>
    {% if is_watched %}
    <svg class="size-5 text-copper transition-transform duration-300 ease-[cubic-bezier(0.34,1.56,0.64,1)] group-hover:scale-125" viewBox="0 0 20 20" fill="currentColor">
        <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
    </svg>
    {% else %}
    <svg class="size-5 text-t4 transition-all duration-300 ease-[cubic-bezier(0.34,1.56,0.64,1)] group-hover:text-copper/60 group-hover:scale-125" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
    </svg>
    {% endif %}
</button>
