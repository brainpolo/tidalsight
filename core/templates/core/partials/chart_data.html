{% if prices_json != "[]" %}
<script>
    const _raw = {{ prices_json|safe }};
    const allData = _raw.map(d => {
        const dt = new Date(d.ts);
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return { close: d.close, ts: d.ts, label: months[dt.getMonth()] + ' ' + dt.getDate() + ', ' + dt.getFullYear() + ' ' + String(dt.getHours()).padStart(2,'0') + ':' + String(dt.getMinutes()).padStart(2,'0') };
    });

    const canvas = document.getElementById('priceChart');
    const ctx = canvas.getContext('2d');
    const pad = { top: 24, right: 24, bottom: 34, left: 58 };

    let prices, labels, timestamps, min, max, xStep, w, h, currentRange;

    function initCanvas() {
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        canvas.style.width = rect.width + 'px';
        canvas.style.height = rect.height + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        w = rect.width;
        h = rect.height;
    }

    // Days-based ranges, anchored to the latest data point (not wall clock)
    const RANGES = { '1D': 1, '1W': 7, '1M': 30, '1Y': 365, '5Y': 1825, 'ALL': 0 };

    function formatAxisLabel(ts, range) {
        const d = new Date(ts);
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const mon = months[d.getMonth()];
        const day = d.getDate();
        const year = d.getFullYear();
        const hh = String(d.getHours()).padStart(2, '0');
        const mm = String(d.getMinutes()).padStart(2, '0');

        if (range === '1D') return hh + ':' + mm;
        if (range === '1W' || range === '1M') return mon + ' ' + day;
        if (range === '1Y') return mon + ' ' + year;
        return mon + ' ' + year; // 5Y, ALL
    }

    function setRange(key) {
        currentRange = key;
        const days = RANGES[key];
        let filtered;

        if (days === 0 || allData.length === 0) {
            filtered = allData;
        } else {
            // Anchor cutoff to the latest data point, not Date.now()
            const latestTs = allData[allData.length - 1].ts;

            if (days === 1) {
                // 1D = show only data from the same calendar date as the latest point
                const latestDate = new Date(latestTs);
                const dayStart = new Date(latestDate.getFullYear(), latestDate.getMonth(), latestDate.getDate()).getTime();
                filtered = allData.filter(d => d.ts >= dayStart);
                // If the last trading day has < 2 points, also include the previous day
                if (filtered.length < 2) {
                    const prevDayStart = dayStart - 86400000;
                    filtered = allData.filter(d => d.ts >= prevDayStart);
                }
            } else {
                const cutoff = latestTs - days * 86400000;
                filtered = allData.filter(d => d.ts >= cutoff);
            }
        }

        if (filtered.length === 0) filtered = allData;

        if (filtered.length > 500) {
            const step = Math.ceil(filtered.length / 500);
            filtered = filtered.filter((_, i) => i % step === 0);
        }

        prices = filtered.map(d => d.close);
        labels = filtered.map(d => d.label);
        timestamps = filtered.map(d => d.ts);
        min = Math.min(...prices) * 0.998;
        max = Math.max(...prices) * 1.002;
        xStep = (w - pad.left - pad.right) / (prices.length - 1);
        drawChart();
        updateRSI();
    }

    function computeRSI(data, period) {
        if (data.length < period + 1) return null;

        // Initial SMA for first `period` changes
        let avgGain = 0, avgLoss = 0;
        for (let i = 1; i <= period; i++) {
            const delta = data[i] - data[i - 1];
            if (delta >= 0) avgGain += delta;
            else avgLoss += Math.abs(delta);
        }
        avgGain /= period;
        avgLoss /= period;

        // Smooth with EMA (Wilder's method) for remaining data
        for (let i = period + 1; i < data.length; i++) {
            const delta = data[i] - data[i - 1];
            const gain = delta >= 0 ? delta : 0;
            const loss = delta < 0 ? Math.abs(delta) : 0;
            avgGain = (avgGain * (period - 1) + gain) / period;
            avgLoss = (avgLoss * (period - 1) + loss) / period;
        }

        if (avgLoss === 0) return 100;
        const rs = avgGain / avgLoss;
        return 100 - (100 / (1 + rs));
    }

    function updateRSI() {
        const period = {{ rsi_period }};
        const rsi = computeRSI(prices, period);
        if (rsi === null) {
            document.getElementById('rsiGauge').classList.add('hidden');
            return;
        }

        const rounded = Math.round(rsi * 10) / 10;
        let signal, signalBg, signalColor, needleColor;

        if (rsi >= 70) {
            signal = 'Sell';
            signalBg = 'rgba(239, 68, 68, 0.15)';
            signalColor = '#ef4444';
            needleColor = '#ef4444';
        } else if (rsi <= 30) {
            signal = 'Buy';
            signalBg = 'rgba(34, 197, 94, 0.15)';
            signalColor = '#22c55e';
            needleColor = '#22c55e';
        } else {
            signal = 'Hold';
            signalBg = 'rgba(255, 255, 255, 0.05)';
            signalColor = '#a09a93';
            needleColor = '#a09a93';
        }

        document.getElementById('rsiGauge').classList.remove('hidden');
        document.getElementById('rsiValue').textContent = rounded.toFixed(1);
        const signalEl = document.getElementById('rsiSignal');
        signalEl.textContent = signal;
        signalEl.style.background = signalBg;
        signalEl.style.color = signalColor;
        const needle = document.getElementById('rsiNeedle');
        needle.style.left = `calc(${rsi}% - 1.5px)`;
        needle.style.background = needleColor;
    }

    function xPos(i) { return pad.left + i * xStep; }
    function yPos(v) { return pad.top + (1 - (v - min) / (max - min)) * (h - pad.top - pad.bottom); }

    function drawChart() {
        ctx.clearRect(0, 0, w, h);

        ctx.strokeStyle = 'rgba(255,255,255,0.04)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 5; i++) {
            const val = min + (max - min) * (i / 4);
            const yy = yPos(val);
            ctx.beginPath();
            ctx.moveTo(pad.left, yy);
            ctx.lineTo(w - pad.right, yy);
            ctx.stroke();
            ctx.fillStyle = '#5c5750';
            ctx.font = '9px Inter, sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText('$' + val.toFixed(2), pad.left - 6, yy + 3);
        }

        const labelCount = Math.min(6, prices.length);
        ctx.fillStyle = '#5c5750';
        ctx.font = '9px Inter, sans-serif';
        for (let i = 0; i < labelCount; i++) {
            const idx = Math.round(i * (prices.length - 1) / (labelCount - 1));
            const lx = xPos(idx);
            // Align last label to right edge, first to left, rest centered
            if (i === labelCount - 1) {
                ctx.textAlign = 'right';
            } else if (i === 0) {
                ctx.textAlign = 'left';
            } else {
                ctx.textAlign = 'center';
            }
            ctx.fillText(formatAxisLabel(timestamps[idx], currentRange), lx, h - 6);
        }
        ctx.textAlign = 'start';

        // Simple, clean: one color for the whole period based on performance
        const bottom = h - pad.bottom;
        const isUp = prices[prices.length - 1] >= prices[0];
        const lineColor = isUp ? '#22c55e' : '#ef4444';

        // Gradient fill beneath the line
        const grad = ctx.createLinearGradient(0, pad.top, 0, bottom);
        grad.addColorStop(0, isUp ? 'rgba(34, 197, 94, 0.18)' : 'rgba(239, 68, 68, 0.18)');
        grad.addColorStop(0.7, isUp ? 'rgba(34, 197, 94, 0.03)' : 'rgba(239, 68, 68, 0.03)');
        grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.beginPath();
        ctx.moveTo(xPos(0), yPos(prices[0]));
        for (let i = 1; i < prices.length; i++) ctx.lineTo(xPos(i), yPos(prices[i]));
        ctx.lineTo(xPos(prices.length - 1), bottom);
        ctx.lineTo(xPos(0), bottom);
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();

        // Line stroke
        ctx.beginPath();
        ctx.moveTo(xPos(0), yPos(prices[0]));
        for (let i = 1; i < prices.length; i++) ctx.lineTo(xPos(i), yPos(prices[i]));
        ctx.strokeStyle = lineColor;
        ctx.lineWidth = 1.5;
        ctx.stroke();
    }

    // Measure tool: array of locked {startIdx, endIdx}, plus pendingStart for in-progress
    let measurements = [];
    let pendingStart = -1;
    let dismissButtons = []; // [{x, y, size, index}]

    function smartDateLabel(startIdx, endIdx) {
        const a = labels[startIdx];
        const b = labels[endIdx];
        // labels are "Mon DD, YYYY HH:MM" format
        const dateA = a.substring(0, a.length - 5).trim(); // "Mon DD, YYYY"
        const dateB = b.substring(0, b.length - 5).trim();
        const timeA = a.substring(a.length - 5).trim(); // "HH:MM"
        const timeB = b.substring(b.length - 5).trim();
        if (dateA === dateB) {
            return timeA + ' → ' + timeB;
        }
        // Different dates: show compact dates
        const shortA = a.substring(0, a.indexOf(',')).trim(); // "Mon DD"
        const shortB = b.substring(0, b.indexOf(',')).trim();
        if (shortA === shortB) return a + ' → ' + timeB;
        return shortA + ' → ' + shortB;
    }

    function drawVerticalLine(x, style, dash) {
        ctx.beginPath();
        ctx.moveTo(x, pad.top);
        ctx.lineTo(x, h - pad.bottom);
        ctx.strokeStyle = style;
        ctx.lineWidth = 1;
        if (dash) ctx.setLineDash(dash);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    function drawDot(x, y, color, glowColor) {
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x, y, 6, 0, Math.PI * 2);
        ctx.strokeStyle = glowColor;
        ctx.lineWidth = 1.5;
        ctx.stroke();
    }

    function drawTooltip(text, anchorX, topY) {
        ctx.font = '600 10px Inter, sans-serif';
        const tw = ctx.measureText(text).width + 16;
        const th = 22;
        let tx = anchorX - tw / 2;
        if (tx < pad.left) tx = pad.left;
        if (tx + tw > w - pad.right) tx = w - pad.right - tw;
        const ty = topY - 2;

        ctx.fillStyle = 'rgba(13, 12, 10, 0.9)';
        ctx.beginPath();
        ctx.roundRect(tx, ty - th + 2, tw, th, 4);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.08)';
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.fillStyle = '#e8e4df';
        ctx.font = '600 10px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(text, tx + tw / 2, ty - th + 16);
        ctx.textAlign = 'start';
    }

    function drawMeasurement(startIdx, endIdx, showDismiss, dismissIndex) {
        const leftIdx = Math.min(startIdx, endIdx);
        const rightIdx = Math.max(startIdx, endIdx);

        // Shaded region
        const regionUp = prices[endIdx] >= prices[startIdx];
        ctx.beginPath();
        ctx.moveTo(xPos(leftIdx), yPos(prices[leftIdx]));
        for (let i = leftIdx + 1; i <= rightIdx; i++) ctx.lineTo(xPos(i), yPos(prices[i]));
        ctx.lineTo(xPos(rightIdx), h - pad.bottom);
        ctx.lineTo(xPos(leftIdx), h - pad.bottom);
        ctx.closePath();
        ctx.fillStyle = regionUp ? 'rgba(34, 197, 94, 0.08)' : 'rgba(239, 68, 68, 0.08)';
        ctx.fill();

        // Both vertical lines
        drawVerticalLine(xPos(startIdx), 'rgba(255,255,255,0.15)', null);
        drawVerticalLine(xPos(endIdx), 'rgba(255,255,255,0.15)', null);

        // Both dots (copper)
        drawDot(xPos(startIdx), yPos(prices[startIdx]), '#c87941', 'rgba(200, 121, 65, 0.4)');
        drawDot(xPos(endIdx), yPos(prices[endIdx]), '#c87941', 'rgba(200, 121, 65, 0.4)');

        // Delta + date tooltip
        const delta = prices[endIdx] - prices[startIdx];
        const deltaPct = ((delta / prices[startIdx]) * 100).toFixed(2);
        const sign = delta >= 0 ? '+' : '';
        const deltaColor = delta >= 0 ? '#22c55e' : '#ef4444';
        const dateLabel = smartDateLabel(startIdx, endIdx);

        const midX = (xPos(startIdx) + xPos(endIdx)) / 2;
        const deltaText = sign + '$' + delta.toFixed(2) + '  (' + sign + deltaPct + '%)';

        ctx.font = '600 9px Inter, sans-serif';
        const deltaW = ctx.measureText(deltaText).width;
        ctx.font = '500 8px Inter, sans-serif';
        const dateW = ctx.measureText(dateLabel).width;
        const dtw = Math.max(deltaW, dateW) + 16;
        const dth = 32;
        let dtx = midX - dtw / 2;
        if (dtx < pad.left) dtx = pad.left;
        if (dtx + dtw > w - pad.right) dtx = w - pad.right - dtw;
        const dty = h - pad.bottom - 8;

        ctx.fillStyle = 'rgba(13, 12, 10, 0.92)';
        ctx.beginPath();
        ctx.roundRect(dtx, dty - dth, dtw, dth, 4);
        ctx.fill();
        ctx.strokeStyle = delta >= 0 ? 'rgba(34, 197, 94, 0.3)' : 'rgba(239, 68, 68, 0.3)';
        ctx.lineWidth = 1;
        ctx.stroke();

        // Delta line
        ctx.fillStyle = deltaColor;
        ctx.font = '600 9px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(deltaText, dtx + dtw / 2, dty - dth + 13);

        // Date line
        ctx.fillStyle = '#5c5750';
        ctx.font = '500 8px Inter, sans-serif';
        ctx.fillText(dateLabel, dtx + dtw / 2, dty - dth + 25);
        ctx.textAlign = 'start';

        // Dismiss button — top-right corner of delta tooltip, only when hovered
        if (showDismiss && dismissIndex !== undefined) {
            const bx = dtx + dtw - 1;
            const by = dty - dth + 1;
            const size = 16;

            ctx.fillStyle = 'rgba(13, 12, 10, 0.85)';
            ctx.beginPath();
            ctx.arc(bx, by, size / 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)';
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.strokeStyle = '#a09a93';
            ctx.lineWidth = 1.5;
            ctx.lineCap = 'round';
            const o = 3;
            ctx.beginPath();
            ctx.moveTo(bx - o, by - o);
            ctx.lineTo(bx + o, by + o);
            ctx.moveTo(bx + o, by - o);
            ctx.lineTo(bx - o, by + o);
            ctx.stroke();

            dismissButtons.push({ x: bx, y: by, size, index: dismissIndex });
        }
    }

    function hitDismiss(mouseX, mouseY) {
        for (const btn of dismissButtons) {
            const dx = mouseX - btn.x;
            const dy = mouseY - btn.y;
            if ((dx * dx + dy * dy) <= (btn.size / 2 + 4) ** 2) return btn.index;
        }
        return -1;
    }

    function isMouseInMeasurement(mouseX, m) {
        const leftX = xPos(Math.min(m.startIdx, m.endIdx));
        const rightX = xPos(Math.max(m.startIdx, m.endIdx));
        return mouseX >= leftX && mouseX <= rightX;
    }

    function drawAllMeasurements(mouseX) {
        dismissButtons = [];
        measurements.forEach((m, i) => {
            const hovered = mouseX !== undefined && isMouseInMeasurement(mouseX, m);
            drawMeasurement(m.startIdx, m.endIdx, hovered, i);
        });
    }

    function drawCrosshair(mouseX, mouseY) {
        const clampedX = Math.max(pad.left, Math.min(w - pad.right, mouseX));
        const idx = Math.round((clampedX - pad.left) / xStep);
        if (idx < 0 || idx >= prices.length) return;

        const px = xPos(idx);
        const py = yPos(prices[idx]);
        const periodUp = prices[prices.length - 1] >= prices[0];

        // Draw all locked measurements, show dismiss only on hovered one
        drawAllMeasurements(mouseX);

        // Check if hovering a dismiss button
        if (hitDismiss(mouseX, mouseY) >= 0) {
            canvas.style.cursor = 'pointer';
            return;
        }

        // Live measuring: first point pinned, hovering for second
        if (pendingStart >= 0 && pendingStart < prices.length) {
            drawMeasurement(pendingStart, idx, false);
        }

        // Hover crosshair line
        drawVerticalLine(px, 'rgba(255,255,255,0.12)', [3, 3]);

        // Hover dot
        const dotColor = periodUp ? '#22c55e' : '#ef4444';
        const dotGlow = periodUp ? 'rgba(34, 197, 94, 0.4)' : 'rgba(239, 68, 68, 0.4)';
        drawDot(px, py, dotColor, dotGlow);

        // Price tooltip
        const price = '$' + prices[idx].toFixed(2);
        const text = price + '  ·  ' + labels[idx];
        drawTooltip(text, px, pad.top);

        canvas.style.cursor = 'crosshair';
    }

    initCanvas();
    setRange('{{ default_chart_range }}');

    document.querySelectorAll('.chart-range[data-range]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelector('.chart-range.active').classList.remove('active');
            btn.classList.add('active');
            measurements = [];
            pendingStart = -1;
            dismissButtons = [];
            setRange(btn.dataset.range);
        });
    });

    let rafPending = false;
    canvas.addEventListener('mousemove', (e) => {
        if (rafPending) return;
        rafPending = true;
        requestAnimationFrame(() => {
            const r = canvas.getBoundingClientRect();
            drawChart();
            drawCrosshair(e.clientX - r.left, e.clientY - r.top);
            rafPending = false;
        });
    });

    canvas.addEventListener('click', (e) => {
        const r = canvas.getBoundingClientRect();
        const mouseX = e.clientX - r.left;
        const mouseY = e.clientY - r.top;
        const clampedX = Math.max(pad.left, Math.min(w - pad.right, mouseX));
        const idx = Math.round((clampedX - pad.left) / xStep);

        // Check dismiss buttons first
        const dismissIdx = hitDismiss(mouseX, mouseY);
        if (dismissIdx >= 0) {
            measurements.splice(dismissIdx, 1);
            drawChart();
            drawCrosshair(mouseX, mouseY);
            return;
        }

        if (pendingStart >= 0) {
            // Second click: lock the measurement
            if (idx >= 0 && idx < prices.length && idx !== pendingStart) {
                measurements.push({ startIdx: pendingStart, endIdx: idx });
                pendingStart = -1;
            }
        } else if (idx >= 0 && idx < prices.length) {
            // First click: set start pin
            pendingStart = idx;
        }

        drawChart();
        drawCrosshair(mouseX, mouseY);
    });

    canvas.addEventListener('mouseleave', () => {
        drawChart();
        drawAllMeasurements();
        // Show pending start pin if set
        if (pendingStart >= 0 && pendingStart < prices.length) {
            const pinX = xPos(pendingStart);
            const pinY = yPos(prices[pendingStart]);
            drawVerticalLine(pinX, 'rgba(255,255,255,0.2)', null);
            drawDot(pinX, pinY, '#c87941', 'rgba(200, 121, 65, 0.4)');
        }
        canvas.style.cursor = 'default';
    });

    document.getElementById('downloadChart').addEventListener('click', () => {
        // Redraw clean chart + any locked measurements (no crosshair)
        drawChart();
        drawAllMeasurements();

        const link = document.createElement('a');
        link.download = document.title.split('—')[0].trim() + ' ' + currentRange + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
</script>
{% endif %}
