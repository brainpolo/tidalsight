{% if loading %}
<p class="text-[0.65rem] leading-relaxed text-t3 mt-1.5"
   hx-get="{% url 'core:asset_description' ticker %}"
   hx-trigger="load delay:4s, retryDescription from:body delay:4s"
   hx-swap="outerHTML">
    {% include "core/components/skeleton_loader.html" with variant="inline" %}
</p>
{% elif description %}
<p class="text-[0.65rem] leading-relaxed text-t3 mt-1.5 mb-5">{{ description }}</p>
{% endif %}
