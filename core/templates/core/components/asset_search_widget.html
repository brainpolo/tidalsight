{% if compact %}
{# Compact mode: inline search bar for asset pages #}
<div class="search-compact-wrap" id="tickerFormWrap">
<form class="search-compact" id="tickerForm" autocomplete="off">
    <svg class="search-compact-icon" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="7" cy="7" r="5"/><path d="M11 11l3.5 3.5"/>
    </svg>
    <input
        type="text"
        id="tickerInput"
        class="search-compact-input"
        placeholder="Search by ticker or name..."
        spellcheck="false"
        name="q"
        hx-get="{% url 'core:asset_search' %}"
        hx-trigger="input changed delay:250ms"
        hx-target="#searchResults"
        hx-swap="innerHTML"
        hx-indicator="closest form"
    >
    <kbd class="search-kbd">&#8984;K</kbd>
    <div class="search-loading-bar"></div>
</form>
<div id="searchResults" class="search-compact-results"></div>
</div>

<style>
    .search-compact-wrap {
        position: relative;
        width: 260px;
    }
    .search-compact {
        position: relative;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        border-radius: 4px;
        border: 1px solid color-mix(in srgb, var(--ts-surface) 8%, transparent);
        background: color-mix(in srgb, var(--ts-surface) 3%, transparent);
        transition: border-color 0.2s, background 0.2s, border-radius 0.15s;
        width: 100%;
    }
    .search-compact:hover {
        border-color: color-mix(in srgb, var(--ts-surface) 14%, transparent);
    }
    .search-compact:focus-within {
        border-color: color-mix(in srgb, var(--ts-surface) 16%, transparent);
        background: color-mix(in srgb, var(--ts-surface) 5%, transparent);
    }
    /* When results are showing, square off bottom corners to connect */
    .search-compact-wrap.has-results .search-compact {
        border-radius: 4px 4px 0 0;
        border-bottom-color: color-mix(in srgb, var(--ts-surface) 4%, transparent);
    }
    .search-compact:focus-within .search-kbd {
        display: none;
    }
    .search-compact-icon {
        color: var(--ts-t4);
        flex-shrink: 0;
    }
    .search-compact-input {
        flex: 1;
        background: none;
        border: none;
        outline: none;
        font-size: 0.75rem;
        color: var(--ts-t1);
        padding: 0;
        min-width: 0;
    }
    .search-compact-input::placeholder {
        color: var(--ts-t4);
        font-size: 0.7rem;
    }
    .search-kbd {
        font-size: 0.5rem;
        font-weight: 500;
        color: var(--ts-t2);
        background: color-mix(in srgb, var(--ts-surface) 12%, transparent);
        border: 1px solid color-mix(in srgb, var(--ts-surface) 18%, transparent);
        border-radius: 3px;
        padding: 2px 6px;
        line-height: 1;
        flex-shrink: 0;
        pointer-events: none;
    }
    .search-compact-results {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        z-index: 9999;
    }
    .search-compact-results:empty {
        display: none;
    }
    .search-compact-results .search-results-list {
        border-radius: 0 0 4px 4px;
        border-top: none;
        margin: 0;
    }
</style>
{% else %}
{# Widget mode: full search for splash page #}
<div class="search-widget" id="searchWidget">
    <form class="search-form" id="tickerForm" autocomplete="off">
        <div class="search-field">
            <div class="search-input-wrapper">
                <input
                    type="text"
                    id="tickerInput"
                    class="search-input"
                    placeholder="Search by ticker or name..."
                    spellcheck="false"
                    name="q"
                    hx-get="{% url 'core:asset_search' %}"
                    hx-trigger="input changed delay:250ms"
                    hx-target="#searchResults"
                    hx-swap="innerHTML"
                    hx-indicator="closest .search-field"
                >
                <div id="searchResults" class="search-results-dropdown"></div>
            </div>
            <div class="search-loading-bar"></div>
            <kbd class="search-kbd-full">&#8984;K</kbd>
            <button type="submit" class="search-submit" id="searchBtn">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 8h10M9 4l4 4-4 4"/>
                </svg>
            </button>
        </div>
    </form>

    <div class="search-tickers">
        <button type="button" class="search-ticker" data-ticker="AAPL">AAPL</button>
        <button type="button" class="search-ticker" data-ticker="BTC-USD">BTC-USD</button>
        <button type="button" class="search-ticker" data-ticker="MSFT">MSFT</button>
        <button type="button" class="search-ticker" data-ticker="GC=F">GC=F</button>
        <button type="button" class="search-ticker" data-ticker="EURUSD=X">EUR/USD</button>
    </div>
</div>

<style>
    .search-widget {
        width: 100%;
        max-width: 400px;
    }

    .search-field {
        display: flex;
        align-items: center;
        border-bottom: 1px solid color-mix(in srgb, var(--ts-surface) 8%, transparent);
        transition: border-color 0.3s ease;
        position: relative;
    }
    .search-field .search-loading-bar {
        left: 0;
        right: 0;
    }

    .search-field:focus-within {
        border-color: var(--color-copper);
    }

    .search-input {
        flex: 1;
        background: none;
        border: none;
        outline: none;
        font-family: 'Instrument Serif', serif;
        font-size: 1.5rem;
        color: var(--ts-t1);
        padding: 10px 0 14px;
        min-width: 0;
    }

    .search-input::placeholder {
        color: var(--ts-t4);
        font-family: 'Instrument Serif', serif;
        font-size: 1.5rem;
    }

    .search-submit {
        display: flex;
        align-items: center;
        justify-content: center;
        background: none;
        border: none;
        color: var(--ts-t3);
        cursor: pointer;
        padding: 10px 0 14px;
        padding-left: 16px;
        transition: color 0.3s ease;
    }

    .search-submit:hover {
        color: var(--color-copper);
    }

    .search-kbd-full {
        font-family: 'Inter', sans-serif;
        font-size: 0.6rem;
        font-weight: 500;
        color: var(--ts-t2);
        background: color-mix(in srgb, var(--ts-surface) 10%, transparent);
        border: 1px solid color-mix(in srgb, var(--ts-surface) 16%, transparent);
        border-radius: 3px;
        padding: 3px 7px;
        line-height: 1;
        flex-shrink: 0;
        pointer-events: none;
    }
    .search-field:focus-within .search-kbd-full {
        display: none;
    }

    .search-tickers {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-top: 16px;
    }

    .search-ticker {
        background: none;
        border: none;
        font-family: 'Inter', sans-serif;
        font-size: 0.65rem;
        font-weight: 400;
        letter-spacing: 0.04em;
        color: var(--ts-t4);
        cursor: pointer;
        padding: 0;
        transition: color 0.3s ease;
    }

    .search-ticker:hover {
        color: var(--color-copper);
    }
</style>
{% endif %}

{# Shared dropdown styles #}
<style>
    /* Search loading indicator */
    @keyframes searchShimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(200%); }
    }
    .search-loading-bar {
        position: absolute;
        bottom: 0;
        left: 8px;
        right: 8px;
        height: 1px;
        overflow: hidden;
        opacity: 0;
        transition: opacity 0.15s;
    }
    .htmx-request .search-loading-bar {
        opacity: 1;
    }
    .search-loading-bar::after {
        content: '';
        position: absolute;
        inset: 0;
        width: 40%;
        background: linear-gradient(90deg, transparent, var(--color-copper), transparent);
        animation: searchShimmer 0.8s ease-in-out infinite;
    }

    .search-input-wrapper {
        position: relative;
        flex: 1;
        min-width: 0;
    }
    .search-results-dropdown {
        position: fixed;
        min-width: min(360px, 90vw);
        z-index: 9999;
    }
    .search-results-dropdown:empty {
        display: none;
    }
    .search-results-list {
        background: var(--ts-page);
        border: 1px solid color-mix(in srgb, var(--ts-surface) 10%, transparent);
        border-radius: 4px;
        overflow-y: auto;
        max-height: min(420px, 60vh);
        list-style: none;
        margin: 0;
        padding: 4px;
    }
    .search-result-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 12px;
        text-decoration: none;
        color: inherit;
        transition: background 0.15s;
        gap: 12px;
        border-radius: 4px;
    }
    .search-result-item:hover,
    .search-result-item.kb-active {
        background: color-mix(in srgb, var(--ts-surface) 4%, transparent);
    }
    .search-result-left {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
    }
    .search-result-ticker {
        font-family: 'Inter', sans-serif;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--ts-heading);
        flex-shrink: 0;
    }
    .search-result-name {
        font-size: 0.65rem;
        color: var(--ts-t3);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 120px;
    }
    .search-result-badge {
        font-size: 0.5rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 2px 6px;
        border-radius: 3px;
        flex-shrink: 0;
    }
    .search-result-badge--equity { background: color-mix(in srgb, var(--color-sea) 12%, transparent); color: var(--color-sea-light); }
    .search-result-badge--crypto { background: color-mix(in srgb, var(--color-copper) 12%, transparent); color: var(--color-copper); }
    .search-result-badge--commodity { background: color-mix(in srgb, var(--color-copper-light) 12%, transparent); color: var(--color-copper-light); }
    .search-result-badge--currency { background: color-mix(in srgb, var(--ts-t3) 12%, transparent); color: var(--ts-t2); }
    .search-result-exchange {
        font-size: 0.5rem;
        color: var(--ts-t3, #5c5750);
        flex-shrink: 0;
    }
    .search-divider {
        height: 1px;
        background: var(--ts-surface, rgba(255,255,255,0.06));
        margin: 4px 12px;
    }
    .search-result-right {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
    }
    .search-result-price {
        font-family: 'Inter', sans-serif;
        font-size: 0.7rem;
        font-weight: 500;
        color: var(--ts-heading);
        font-variant-numeric: tabular-nums;
    }
    .search-result-change {
        font-family: 'Inter', sans-serif;
        font-size: 0.6rem;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
    }
    .search-result-change.up { color: var(--color-green-500, #22c55e); }
    .search-result-change.down { color: var(--color-red-500, #ef4444); }
</style>

<script>
    (function() {
        const form = document.getElementById('tickerForm');
        const input = document.getElementById('tickerInput');
        const tickers = document.querySelectorAll('.search-ticker');
        const resultsEl = document.getElementById('searchResults');

        function navigate(ticker) {
            ticker = ticker.trim().toUpperCase();
            if (ticker) window.location.href = '/assets/' + encodeURIComponent(ticker) + '/';
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            // If a result is highlighted, navigate to it instead
            const active = resultsEl.querySelector('.kb-active');
            if (active) {
                window.location.href = active.getAttribute('href');
            } else {
                navigate(input.value);
            }
        });

        tickers.forEach(function(btn) {
            btn.addEventListener('click', function() {
                navigate(this.getAttribute('data-ticker'));
            });
        });

        input.addEventListener('input', function() {
            const pos = this.selectionStart;
            this.value = this.value.toUpperCase();
            this.setSelectionRange(pos, pos);
        });

        document.addEventListener('keydown', function(e) {
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                e.preventDefault();
                input.focus();
                input.select();
            }
        });

        // Keyboard navigation for search results
        let activeIdx = -1;

        function getItems() {
            return resultsEl.querySelectorAll('.search-result-item');
        }

        function setActive(idx) {
            const items = getItems();
            items.forEach(el => el.classList.remove('kb-active'));
            activeIdx = idx;
            if (idx >= 0 && idx < items.length) {
                items[idx].classList.add('kb-active');
                items[idx].scrollIntoView({ block: 'nearest' });
            }
        }

        input.addEventListener('keydown', function(e) {
            const items = getItems();
            if (!items.length) return;

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                setActive(activeIdx < items.length - 1 ? activeIdx + 1 : 0);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                setActive(activeIdx > 0 ? activeIdx - 1 : items.length - 1);
            } else if (e.key === 'Escape') {
                resultsEl.innerHTML = '';
                activeIdx = -1;
                updateHasResults();
            }
        });

        // Position dropdown below input
        // Compact mode uses absolute positioning (no JS needed)
        // Widget mode uses fixed positioning
        var wrap = document.getElementById('tickerFormWrap');
        var isCompact = !!wrap;

        function positionDropdown() {
            if (!resultsEl.innerHTML.trim()) return;
            if (isCompact) return; // absolute positioning handles it
            var rect = input.getBoundingClientRect();
            resultsEl.style.top = (rect.bottom + 6) + 'px';
            resultsEl.style.left = rect.left + 'px';
        }

        function updateHasResults() {
            if (wrap) {
                var has = !!resultsEl.innerHTML.trim();
                wrap.classList.toggle('has-results', has);
            }
        }

        // Reset active index when new results arrive
        document.body.addEventListener('htmx:afterSwap', function(e) {
            if (e.detail.target === resultsEl) {
                activeIdx = -1;
                positionDropdown();
                updateHasResults();
            }
        });

        // Dismiss dropdown on click outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('#tickerForm') && !e.target.closest('#tickerFormWrap') && !e.target.closest('#searchResults')) {
                resultsEl.innerHTML = '';
                activeIdx = -1;
                updateHasResults();
            }
        });
    })();
</script>
