<div class="max-w-[1120px] mx-auto px-4 sm:px-10">
    <section class="py-10">
        <div class="text-[0.65rem] font-semibold tracking-[0.14em] uppercase text-t3 mb-6">Peers</div>
        <div class="flex gap-3 overflow-hidden">
            {% for _ in "123456" %}
            <div class="shrink-0 w-[160px] border border-surface/[0.04] rounded-sm p-4">
                <div class="flex items-center gap-2 mb-2">
                    <div class="size-5 rounded bg-surface/[0.04] skel-bar" style="animation-delay:{{ forloop.counter0 }}00ms"></div>
                    <div class="h-3 w-10 bg-surface/[0.06] skel-bar" style="animation-delay:{{ forloop.counter }}00ms"></div>
                </div>
                <div class="h-2.5 w-20 bg-surface/[0.04] skel-bar mb-2" style="animation-delay:{{ forloop.counter }}50ms"></div>
                <div class="h-3 w-14 bg-surface/[0.04] skel-bar" style="animation-delay:{{ forloop.counter }}50ms"></div>
            </div>
            {% endfor %}
        </div>
        {% if message %}<div class="text-[0.55rem] text-t4 mt-3">{{ message }}</div>{% endif %}
    </section>
</div>
<div class="divider"></div>
