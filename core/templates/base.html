{% load static %}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TidalSight{% endblock %}</title>

    <!-- Theme: apply before paint to prevent flash -->
    <script>
        (function() {
            var t = localStorage.getItem('tidalsight_theme') || 'auto';
            var dark = t === 'dark' || (t === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            document.documentElement.classList.toggle('dark', dark);
        })();
    </script>

    <!-- Tailwind (built) -->
    <link rel="stylesheet" href="{% static 'css/dist.css' %}">

    <!-- htmx (vendored) -->
    <script defer src="{% static 'js/htmx.min.js' %}"></script>

    <!-- Lucide icons (tree-shaken bundle) -->
    <script defer src="{% static 'js/icons.bundle.js' %}"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

    {% block head %}{% endblock %}
</head>
<body class="bg-page text-t1 font-sans antialiased overflow-x-hidden pt-7 sm:pt-8" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    <div class="fixed top-0 left-0 right-0 z-50" data-trending-container
         hx-get="{% url 'core:trending_banner' %}"
         hx-trigger="load"
         hx-swap="innerHTML">
    </div>
    {% block body %}{% endblock %}

    {% include "core/components/disclaimer.html" %}

    {% block scripts %}{% endblock %}
</body>
</html>
