{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TidalSight{% endblock %}</title>

    <!-- Tailwind (built) -->
    <link rel="stylesheet" href="{% static 'css/dist.css' %}">

    <!-- htmx (vendored) -->
    <script defer src="{% static 'js/htmx.min.js' %}"></script>

    <!-- Lucide icons (tree-shaken bundle) -->
    <script defer src="{% static 'js/icons.bundle.js' %}"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

    {% block head %}{% endblock %}
</head>
<body class="bg-ink text-[#fafafa] font-sans antialiased overflow-x-hidden" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    {% block body %}{% endblock %}

    {% include "core/components/disclaimer.html" %}

    {% block scripts %}{% endblock %}
</body>
</html>
