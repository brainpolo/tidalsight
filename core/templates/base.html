<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TidalSight{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ink: '#0d0c0a',
                        copper: { DEFAULT: '#c87941', light: '#e0a87c' },
                        sea: { DEFAULT: '#4a8f8f', light: '#6fb5b5' },
                    },
                    fontFamily: {
                        serif: ['"Instrument Serif"', 'serif'],
                        sans: ['Inter', '-apple-system', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <!-- htmx -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

    {% block head %}{% endblock %}
</head>
<body class="bg-ink text-[#fafafa] font-sans antialiased overflow-x-hidden">
    {% block body %}{% endblock %}

    {% block scripts %}{% endblock %}
</body>
</html>
